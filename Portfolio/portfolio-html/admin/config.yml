backend:
  name: git-gateway
  branch: main # Branch to update (change if necessary)

media_folder: "assets"
public_folder: "assets"

collections:
  - name: "portfolio"
    label: "Portfolio Data"
    files:
      - name: "projects"
        label: "Projects"
        file: "projects.json"
        description: "Manage portfolio case studies"
        fields:
          - label: "Projects list"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "HTML File", name: "file", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Cover Image"
                name: "coverImage"
                widget: "image"
                required: false
              - label: "Meta Data"
                name: "meta"
                widget: "object"
                fields:
                  - { label: "Role", name: "role", widget: "string" }
                  - { label: "Year", name: "year", widget: "string" }
                  - { label: "Timeline", name: "timeline", widget: "string" }
                  - { label: "Team", name: "team", widget: "string" }
                  - { label: "Platform", name: "platform", widget: "string" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
              - label: "Visibility"
                name: "visibility"
                widget: "select"
                options: ["public", "private"]
              - { label: "Password (if private)", name: "password", widget: "string", required: false }
              - { label: "Order", name: "order", widget: "number" }
              - { label: "Highlight (Featured)", name: "highlight", widget: "boolean" }
              - { label: "NDA Note", name: "ndaNote", widget: "text", required: false }
